name: Conventional Commit PR Title

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  validate-pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest

    steps:
      - name: Check Conventional Commit format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._/-]+\))?!?: .{1,100}$'

          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "::error title=Invalid PR title::Use Conventional Commit format: type(scope): short description"
            echo "Allowed types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            echo "Examples:"
            echo "  feat(auth): tambah login admin"
            echo "  fix(absensi): perbaiki validasi lokasi"
            echo "  docs(readme): update panduan instalasi"
            echo ""
            echo "Repository rule: use one PR for one context, then squash merge so main receives one clean Conventional Commit."
            exit 1
          fi

          echo "Valid Conventional Commit PR title: $PR_TITLE"
